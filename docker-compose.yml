# MCSM stack — deployable on Coolify or with plain `docker compose up`.
#
#   mcsm                — the web app (image published to GHCR by CI)
#   infrarust           — the Minecraft proxy (label-based discovery)
#   docker-socket-proxy — mediates Docker access; no service mounts the raw socket
#
# MCSM creates Minecraft server containers at runtime and attaches them to the
# `infrarust` network, where Infrarust discovers and routes them by their
# `infrarust.*` labels.

services:
  # Restricts Docker API access. Both MCSM and Infrarust talk to this over TCP
  # instead of mounting /var/run/docker.sock directly.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: "1" # list / inspect / create / start / stop / remove
      IMAGES: "1" # pull the Minecraft image
      NETWORKS: "1" # attach containers to the shared network
      VOLUMES: "1" # world volumes
      EVENTS: "1" # Infrarust watches container events
      INFO: "1"
      VERSION: "1"
      PING: "1"
      POST: "1" # allow write operations on the resources enabled above
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dockerproxy

  mcsm:
    image: ghcr.io/niki2k1/mcsm:latest
    # For a local build instead of the published image, comment `image` above
    # and uncomment:
    # build: .
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    environment:
      # These override Nuxt `runtimeConfig` at runtime. Nuxt only re-applies env
      # for `NUXT_`-prefixed vars whose names mirror the runtimeConfig structure
      # (https://nuxt.com/docs/guide/going-further/runtime-config) — plain names
      # like DOCKER_HOST_ADDR would be ignored by the prebuilt image.
      #
      # Reach Docker through the socket proxy (no raw socket here).
      NUXT_DOCKER_HOSTS_DEFAULT_HOST: docker-socket-proxy
      NUXT_DOCKER_HOSTS_DEFAULT_PORT: "2375"
      NUXT_DOCKER_HOSTS_DEFAULT_PROTOCOL: http
      # Network new Minecraft containers join (matches the `infrarust` network
      # below) so Infrarust can reach them.
      NUXT_DOCKER_NETWORK: infrarust
      NUXT_DOCKER_IMAGE: itzg/minecraft-server
      # Coolify: generates a domain and routes HTTPS to port 3000.
      SERVICE_FQDN_MCSM_3000: ""
    # mcsm is multi-homed (dockerproxy for the Docker API, infrarust for RCON
    # and server pings). When a container is on several networks, Coolify's
    # Traefik picks one non-deterministically to route through — and if it picks
    # one it can't reach (e.g. the `internal` dockerproxy network), every request
    # hangs until it times out (504). The label below pins Traefik to Coolify's
    # proxy network, but that only works if mcsm is actually *attached* to it —
    # and declaring explicit `networks:` stops Coolify from auto-attaching it.
    # So we attach `coolify` (declared external below) ourselves, which makes
    # routing deterministic.
    labels:
      traefik.docker.network: coolify
    # Let Coolify/Traefik route only once Nitro is actually listening (also
    # avoids 504s during a redeploy before the new container is up).
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mcsm-data:/app/.data
    networks:
      - coolify
      - infrarust
      - dockerproxy
    # Plain `docker compose up` (non-Coolify): expose the UI on the host.
    # ports:
    #   - "3000:3000"

  infrarust:
    # Our own build of Infrarust WITH the Docker provider compiled in. The
    # upstream image ships without the `docker` cargo feature, so it ignores the
    # [docker] config and discovers no backends (see infrarust/Dockerfile).
    image: ghcr.io/niki2k1/mcsm-infrarust:latest
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    # The Infrarust config is injected via the top-level `configs` block below
    # rather than a `volumes:` bind mount. A single-file bind mount is fragile
    # (Docker turns a missing source into a *directory*, and Coolify always
    # creates file-mount sources as directories — coollabsio/coolify#8107),
    # which made the binary fail with "config.yaml: Is a directory". Inline
    # `configs` content sidesteps the host filesystem entirely.
    configs:
      - source: infrarust_config
        target: /app/config/config.toml
    # Infrarust validates that `servers_dir` exists even when every backend is
    # discovered via the Docker provider, so give it an empty directory. A named
    # volume reliably materialises as a *directory* on all platforms (including
    # Coolify, which would mangle a single-file bind mount).
    volumes:
      - infrarust-servers:/app/config/servers
    # Override the image's default CMD. The current binary's CLI is
    # `--config <CONFIG> --plugins-dir <PLUGINS_DIR>` and no longer accepts the
    # old `--servers-dir` flag (it crashes on startup with "unexpected argument
    # '--servers-dir'"). The config is parsed as TOML, so we ship it as
    # config.toml rather than the image default path it can't find.
    command: ["--config", "/app/config/config.toml", "--plugins-dir", "/app/config/plugins"]
    ports:
      - "25565:25565"
    networks:
      - infrarust
      - dockerproxy

networks:
  # Coolify's Traefik proxy network. Declared external so mcsm is deterministically
  # attached and Traefik can always reach it (fixes intermittent 504s on this
  # multi-homed service). On a plain `docker compose up` (no Coolify) this network
  # won't exist — either run `docker network create coolify` once, or remove the
  # `coolify` network from this file along with the mcsm reference above.
  coolify:
    external: true
  # Shared with the Minecraft containers MCSM creates. The explicit name keeps
  # it stable so NUXT_DOCKER_NETWORK matches.
  infrarust:
    name: infrarust
  # Docker API only; isolated from the internet.
  dockerproxy:
    internal: true

volumes:
  mcsm-data:
  # Empty directory for Infrarust's file provider; routing comes from Docker
  # labels, so nothing is ever written here — it just has to exist.
  infrarust-servers:

# Infrarust proxy config (TOML — the v2 binary parses --config as TOML),
# injected into the container at /app/config/config.toml. Inlined rather than
# bind-mounted so it works reliably on Coolify, which mishandles single-file
# bind mounts.
#
# Routing is driven entirely by Docker labels — MCSM sets `infrarust.enable`,
# `infrarust.domains` and `infrarust.port` on each container it creates, and the
# [docker] provider below discovers them. No per-server config files needed.
configs:
  infrarust_config:
    content: |
      bind = "0.0.0.0:25565"
      # Static server-config dir. Unused (routing is label-driven) but Infrarust
      # requires it to exist; an empty named volume is mounted here.
      servers_dir = "/app/config/servers"

      [docker]
      # Talk to Docker through the socket proxy (same as MCSM).
      endpoint = "tcp://docker-socket-proxy:2375"
      # Prefer the shared network MCSM attaches Minecraft containers to when
      # resolving their backend addresses.
      network = "infrarust"
      # Fallback polling interval; real-time updates come from the event stream.
      poll_interval = "10s"
