allowBuilds:
  '@parcel/watcher': set this to true or false
  cpu-features: set this to true or false
  esbuild: set this to true or false
  protobufjs: set this to true or false
  ssh2: set this to true or false
  vue-demi: set this to true or false
# Packages allowed to bypass the minimumReleaseAge supply-chain policy.
# These were published within the release-age cutoff but are trusted upgrades.
minimumReleaseAgeExclude:
  - fuse.js
  - protobufjs
  - tinyexec
  - tinyglobby
