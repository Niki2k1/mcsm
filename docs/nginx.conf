server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sensible compression for text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/xml text/xml;
    gzip_min_length 1024;

    # Hashed build assets never change — cache them hard.
    location /_nuxt/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Docus generates extensionless routes as `<route>.html`
    # (e.g. /features/backups -> features/backups.html).
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
}
